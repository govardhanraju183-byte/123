<!DOCTYPE html>
<html>
    <head>
        <title>Tables with CSS</title>
        <style>
            table{
                width: 50%;
                text-align: center;
                margin: 100px auto;
                border: 1px solid gray;
                border-collapse: collapse;
            }
            th,td{
                border: 1px solid gray;
            }
            th{
                height: 75px;
            }
            td{
                height: 50px;
            }
            tr:nth-child(even){
                background-color: orange;
                color: white;
            }
            tr:nth-child(odd){
                background-color: olivedrab;
                color: white;
            }
            tr:hover{
                background-color: yellow;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>SNO</th>
                <th>NAME</th>
                <th>COST</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Laptop</td>
                <td>10000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Mobile</td>
                <td>20000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Watch</td>
                <td>30000</td>
            </tr>
            <tr>
                <td>4</td>
                <td>EarBuds</td>
                <td>40000</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Apple</td>
                <td>50000</td>
            </tr>
        </table>
    </body>
</html>
