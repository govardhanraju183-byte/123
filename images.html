<!DOCTYPE html>
<html>
    <head>
        <title>images</title>
        <style>
            img{
                border: 1px solid orange;
                padding: 20px;
                border-radius: 30px;
                margin: 20px;
            
            }
            .c1:hover{
                border: 10px solid red;
            }
            .c2:hover{
                width: 150px;
                height: 150px;
                border: 5px solid green;
                border-radius: 100%;
            }
            .c3:hover{
                display: none;
            }
        </style>
    </head>
    <body>
        <img src="nivida.png" alt="nivida" class="c1">
        <img src="kkr.jfif" alt="kkr" class="c2">
        <img src="netfilx.jfif" alt="netflix" class="c3"
    </body>
</html>
