<!DOCTYPE html>
<html>
    <head>
        <title>Absolute - Example</title>
        <style>
            button{
                position: absolute;
                left: 200px;
                top: 40px;
            }
            fieldset{
                width: 25%;
                padding: 20px;
                border-radius: 30px;
                margin: 100px auto;
                position: relative;
            }
        </style>
    </head>
    <body>
        <fieldset>
            <legend>LOGIN</legend>
            <input type="text" name="username" placeholder="enter username">
            <br><br>
            <input type="password" name="pass" placeholder="enter password">
            <br><br>
            <button>Login</button>
        </fieldset>
    </body>
</html>
